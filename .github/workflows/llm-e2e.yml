name: LLM e2e (Ollama)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  llm-e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull qwen2.5

      - name: Install Ylang
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run LLM e2e smoke tests
        working-directory: app
        env:
          OLLAMA_HOST: http://127.0.0.1:11434
        run: pytest -q -m llm_e2e
