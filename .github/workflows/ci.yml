name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/pyproject.toml

      - name: Install Ylang
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q -m "not llm_e2e"

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/pyproject.toml

      - name: Install Ylang and pyright
        run: |
          pip install -e ".[dev]"
          pip install pyright

      - name: Pyright
        run: pyright src/ylang
